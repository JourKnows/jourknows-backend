
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: jourknows_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jourknows
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: jourknows_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
